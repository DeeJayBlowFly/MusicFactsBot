<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-DeeJayBlowFly Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>

        <h1>🎧 AI-DeeJayBlowFly Dashboard</h1>

        <div class="buttons">

            <button id="start">▶ Start</button>

            <button id="stop">■ Stop</button>

            <input
                id="testTrack"
                type="text"
                placeholder="Artist - Title"
                style="width:320px;padding:10px;border-radius:6px;border:none;"
            >

            <select
                id="language"
                style="padding:10px;border-radius:6px;border:none;"
            >
                <option value="de">🇩🇪 Deutsch</option>
                <option value="en">🇬🇧 English</option>
                <option value="da">🇩🇰 Dansk</option>
            </select>

            <button id="test">🧪 Test Fact</button>

            <button id="manualNowPlaying">🎵 Send Now Playing</button>

        </div>

    </header>

    <div class="grid">

        <div class="card">

            <h2>Status</h2>

            <table>

                <tr>
                    <td>Twitch</td>
                    <td id="twitch">🟢 Connected</td>
                </tr>

                <tr>
                    <td>OpenAI</td>
                    <td id="openai">🟢 Online</td>
                </tr>

                <tr>
                    <td>MusicBrainz</td>
                    <td id="musicbrainz">🟢 Online</td>
                </tr>

                <tr>
                    <td>Discogs</td>
                    <td id="discogs">🟢 Online</td>
                </tr>

                <tr>
                    <td>Wikipedia</td>
                    <td id="wikipedia">🟢 Online</td>
                </tr>

                <tr>
                    <td>Uptime</td>
                    <td id="uptime"></td>
                </tr>

            </table>

        </div>

        <div class="card">

            <h2>Now Playing</h2>

            <div id="track">
                Waiting...
            </div>

        </div>

        <div class="card">

            <h2>Latest Fact</h2>

            <div id="fact">
                Waiting...
            </div>

        </div>

        <div class="card">

            <h2>Statistics</h2>

            <table>

                <tr>
                    <td>Facts sent</td>
                    <td id="factsSent">0</td>
                </tr>

                <tr>
                    <td>Unique songs</td>
                    <td id="songs">0</td>
                </tr>

                <tr>
                    <td>Cache hits</td>
                    <td id="cacheHits">0</td>
                </tr>

            </table>

        </div>

        <div class="card">

            <h2>Live Log</h2>

            <pre id="log">Dashboard started...</pre>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
