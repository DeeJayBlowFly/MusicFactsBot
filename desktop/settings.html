<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
    margin:30px;
}

h1{
    color:#22c55e;
}

label{
    display:block;
    margin-top:20px;
}

input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
    margin-top:5px;
}

button{
    margin-top:30px;
    padding:12px 25px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>AI-DeeJayBlowFly Settings</h1>

<label>OpenAI API Key</label>
<input id="apikey">

<label>Twitch Username</label>
<input id="username">

<label>OAuth Token</label>
<input id="oauth">

<label>Channel</label>
<input id="channel">

<button>Save</button>

</body>
</html>
